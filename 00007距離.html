<!DOCTYPE html>
<HTML lang="ja">
<HEAD>
<META charset="utf-8" />
<TITLE>BOKE防止プログラミング</TITLE>
<SCRIPT>
function printMessage(hoge, lat1, lng1, lat2, lng2) {
    const element = document.getElementById("message");

    distance = getDistance(lat1, lng1, lat2, lng2);

    element.innerHTML = hoge + distance + "kmです！";
}

/**
 * 2地点の緯度経度から距離(km)を計算する関数
 */
function getDistance(lat1, lng1, lat2, lng2) {
  // 地球の半径 (km)
  const R = 6371; 
  
  // 度をラジアンに変換
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLng / 2) * Math.sin(dLng / 2);
            
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  const distance = R * c; // 距離 (km)
  
  return distance;
}

// 使用例：東京駅と大阪駅の距離
const tokyo = { lat: 35.681236, lng: 139.767125 };
const osaka = { lat: 34.702485, lng: 135.495951 };

</SCRIPT>

</HEAD>
<BODY>
<DIV id="message">Hello World !</DIV><BUTTON type="button" onclick="printMessage('東京と大阪の距離は', tokyo.lat, tokyo.lng, osaka.lat, osaka.lng)">東京と大阪の距離は？</BUTTON>
</BODY>
</HTML>
