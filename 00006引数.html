<!DOCTYPE html>
<HTML lang="ja">
<HEAD>
<META charset="utf-8" />
<TITLE>BOKE防止プログラミング</TITLE>
<SCRIPT>
function printMessage(hoge) {
    const element = document.getElementById("message");
    element.innerHTML = hoge;
}

</SCRIPT>

</HEAD>
<BODY>
<DIV id="message">Hello World !</DIV><BUTTON type="button" onclick="printMessage('引数で変わったのだ')">押すと変わるのだ！</BUTTON>
</BODY>
</HTML>
