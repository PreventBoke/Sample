<!DOCTYPE html>
<HTML lang="ja">
<HEAD>
<META charset="utf-8" />
<TITLE>BOKE防止プログラミング</TITLE>
<SCRIPT>
function printMessage() {
    const element = document.getElementById("message");
    element.innerHTML = "押されたのだ";
}
</SCRIPT>

</HEAD>
<BODY>
<DIV id="message">Hello World !</DIV><BUTTON type="button" onclick="printMessage()">押してみるのだ！</BUTTON>
</BODY>
</HTML>
