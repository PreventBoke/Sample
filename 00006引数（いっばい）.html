<!DOCTYPE html>
<HTML lang="ja">
<HEAD>
<META charset="utf-8" />
<TITLE>BOKE防止プログラミング</TITLE>
<SCRIPT>
function printMessage(hoge) {
    const element = document.getElementById("message");
    element.innerHTML = hoge;
}
</SCRIPT>

</HEAD>
<BODY>
<DIV id="message">Hello World !</DIV>
<BUTTON type="button" onclick="printMessage('引数で変わったのだ')">押すと変わるのだ！</BUTTON>
<BUTTON type="button" onclick="printMessage('こんにちは')">①</BUTTON>
<BUTTON type="button" onclick="printMessage('ぼく、ドラえもん、です')">②</BUTTON>
<BUTTON type="button" onclick="printMessage('ねぇ、のび太くん')">④</BUTTON>
<BUTTON type="button" onclick="printMessage('もう宿題終わった？')">⑤</BUTTON>
</BODY>
</HTML>
